<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign OS - Secure Uplink Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="text-white antialiased secure-uplink-body">

    <header class="p-6 flex justify-between items-center border-b border-zinc-900 bg-black">
        <img src="../logo.png" alt="Logo" class="h-6 w-auto">
        <div class="text-right">
            <span id="sys-status" class="text-[8px] font-black text-red-600 uppercase tracking-widest">Enlace Vulnerable</span>
        </div>
    </header>

    <main class="flex flex-col items-center justify-around h-[85vh] p-6">

        <!-- Entrada de código de acceso (modo agente secreto) -->
        <div class="w-full max-w-sm mb-3">
            <label for="access-code-input" class="block text-[8px] uppercase tracking-widest text-zinc-500 font-black">
                Código de acceso
            </label>
            <div class="flex gap-2 mt-1">
                <input
                    id="access-code-input"
                    type="text"
                    placeholder="Introduce tu código"
                    class="flex-1 bg-black/60 border border-zinc-800 rounded px-2 py-1 text-[11px] font-mono focus:outline-none focus:border-blue-500"
                    autocomplete="off"
                >
                <button
                    id="access-code-btn"
                    onclick="verifyAccessCode()"
                    class="px-3 py-1 border border-zinc-800 bg-zinc-900/60 rounded text-[8px] font-black uppercase tracking-widest hover:border-blue-500 hover:text-blue-400 active:scale-95 transition-all"
                >
                    Validar
                </button>
            </div>
            <p id="access-feedback" class="text-[9px] mt-1 font-mono text-zinc-500 h-4"></p>
        </div>

        <!-- Terminal principal: primero se verifica el código, luego aparece el control de uplink -->
        <div class="w-full max-w-sm terminal-box p-4 rounded-lg border border-zinc-800 shadow-2xl">
            <div id="log-container">
                <div class="log-line log-warning opacity-100">> ALERTA: TÚNEL NO CIFRADO</div>
                <div class="log-line text-zinc-600 opacity-100">> ESPERANDO HANDSHAKE MANUAL...</div>
            </div>
        </div>

        <div id="terminal-root" class="status-alert flex flex-col items-center hidden">
            <div class="main-btn" onclick="startUplinkSequence()">
                <i class="fas fa-satellite-dish text-5xl"></i>
            </div>
            
            <div id="progress-wrap" class="progress-container">
                <div id="p-bar" class="progress-bar"></div>
            </div>
            
            <p id="counter-text" class="text-[9px] font-mono text-center mt-3 text-zinc-500"></p>

            <button id="disconnect-btn" onclick="disconnectUplink()" class="hidden mt-6 px-8 py-2 border border-red-900 bg-red-950/20 rounded text-[9px] font-black uppercase text-red-500 active:scale-95 transition-all">
                <i class="fas fa-times-circle mr-2"></i> Terminar Enlace
            </button>
        </div>

        <div class="w-full max-w-xs">
            <div class="flex justify-between items-center px-4 h-12 border-t border-zinc-900 pt-4">
                <div class="text-left w-24">
                    <p class="text-[7px] text-zinc-500 uppercase font-black">Origin</p>
                    <p id="origin-label" class="text-[11px] font-bold">---</p>
                </div>
                <div id="connection-line" class="opacity-0 transition-opacity duration-1000">
                    <i class="fas fa-arrows-alt-h text-blue-500"></i>
                </div>
                <div class="text-right w-24">
                    <p class="text-[7px] text-zinc-500 uppercase font-black">Target</p>
                    <p id="target-label" class="text-[11px] font-bold">---</p>
                </div>
            </div>
        </div>
    </main>

    <div id="bottom-nav"></div>

    <script src="../nav.js"></script>
    <script>
        renderBottomNav('../');
    </script>

    <script>
        const root = document.getElementById('terminal-root');
        const log = document.getElementById('log-container');
        const sysStatus = document.getElementById('sys-status');
        const pBar = document.getElementById('p-bar');
        const pWrap = document.getElementById('progress-wrap');
        const counterText = document.getElementById('counter-text');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const originLabel = document.getElementById('origin-label');
        const targetLabel = document.getElementById('target-label');
        const connLine = document.getElementById('connection-line');
        const accessCodeInput = document.getElementById('access-code-input');
        const accessFeedback = document.getElementById('access-feedback');

        let secureConfig = null;
        let authenticatedUser = null;
        let isAccessSequenceRunning = false;

        function addLog(text, type = 'blue') {
            const line = document.createElement('div');
            line.className = 'log-line log-active';
            if (type === 'warning') {
                line.classList.add('log-warning');
            }
            if (type === 'success') {
                // tono verde para mensajes de aceptación
                line.style.color = '#22c55e';
            }
            line.innerText = `> ${text}`;
            log.appendChild(line);
            if (log.children.length > 7) log.removeChild(log.children[0]);
        }

        function playLogSequence(sequence, delay = 500, onComplete) {
            if (!sequence || !sequence.length) {
                if (onComplete) onComplete();
                return;
            }

            // Evita solapar animaciones de acceso
            isAccessSequenceRunning = true;
            let index = 0;

            const step = () => {
                const item = sequence[index];
                if (!item) {
                    isAccessSequenceRunning = false;
                    if (onComplete) onComplete();
                    return;
                }
                addLog(item.text, item.type || 'blue');
                index++;
                if (index < sequence.length) {
                    setTimeout(step, delay);
                } else {
                    isAccessSequenceRunning = false;
                    if (onComplete) onComplete();
                }
            };

            step();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('secureuplink.json');
                if (!response.ok) throw new Error('No se pudo cargar la configuración.');
                secureConfig = await response.json();
                addLog("CONFIGURACIÓN DE ENLACE CARGADA.");
            } catch (error) {
                addLog("ERROR: CONFIGURACIÓN NO DISPONIBLE. CONTACTA CON SOPORTE.", 'warning');
            }

            if (localStorage.getItem('secureNetworkActive') === 'true') {
                setFinalState();
            }
        });

        function verifyAccessCode() {
            if (isAccessSequenceRunning) {
                return;
            }

            if (!secureConfig || !Array.isArray(secureConfig.usuarios)) {
                accessFeedback.innerText = "Error de configuración. Intenta más tarde.";
                accessFeedback.classList.remove('text-emerald-400');
                accessFeedback.classList.add('text-red-500');
                addLog("CONFIGURACIÓN NO DISPONIBLE. IMPOSIBLE VERIFICAR CÓDIGO.", 'warning');
                return;
            }

            const rawCode = accessCodeInput.value.trim();
            if (!rawCode) {
                accessFeedback.innerText = "Introduce un código válido.";
                accessFeedback.classList.remove('text-emerald-400');
                accessFeedback.classList.add('text-red-500');
                return;
            }

            const code = rawCode.toUpperCase();
            const user = secureConfig.usuarios.find(u => (u.codigo || '').toUpperCase() === code);

            // Secuencia base tipo agente secreto
            const baseSequence = [
                { text: "INICIALIZANDO..." },
                { text: "CARGANDO CÓDIGO DE SEGURIDAD..." }
            ];

            if (!user) {
                authenticatedUser = null;
                accessFeedback.innerText = "ACCESO DENEGADO";
                accessFeedback.classList.remove('text-emerald-400');
                accessFeedback.classList.add('text-red-500');
                const sequence = baseSequence.concat([
                    { text: "CÓDIGO DE SEGURIDAD RECHAZADO.", type: 'warning' }
                ]);
                playLogSequence(sequence, 550);
                return;
            }

            authenticatedUser = user;
            accessFeedback.innerText = "ACCESO CONCEDIDO";
            accessFeedback.classList.remove('text-red-500');
            accessFeedback.classList.add('text-emerald-400');

            // Mostrar datos del JSON línea a línea, de forma secuencial (sin revelar target aún)
            const sequence = baseSequence.concat([
                { text: "CÓDIGO DE SEGURIDAD ACEPTADO.", type: 'success' },
                { text: `SUJETO: ${user.usuario}` },
                { text: `STATUS: ${user.status}` },
                { text: `RELACIÓN: ${user.relacion}` },
                { text: "EN ESPERA DE ORDEN PARA ABRIR TÚNEL..." }
            ]);

            // A partir de aquí, cuando termina la secuencia, se muestra el control de uplink
            playLogSequence(sequence, 550, () => {
                root.classList.remove('hidden');
            });
        }

        function startUplinkSequence() {
            if (!authenticatedUser) {
                addLog("IDENTIFICACIÓN REQUERIDA. INTRODUCE CÓDIGO DE ACCESO.", 'warning');
                return;
            }

            if (root.classList.contains('active-mode')) return;

            root.classList.remove('status-alert');
            pWrap.style.display = 'block';
            addLog("AUTORIZACIÓN RECIBIDA.", 'blue');
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 2;
                pBar.style.width = progress + '%';
                counterText.innerText = `CONECTANDO: ${progress}%`;

                if (progress === 10) {
                    const originText = secureConfig && secureConfig.origin ? secureConfig.origin : 'ORIGEN DESCONOCIDO';
                    addLog(`TRIANGULANDO ORIGIN: ${originText}...`);
                    originLabel.innerHTML = `<span class="scanning-text">${originText}</span>`;
                }
                if (progress === 40) {
                    addLog("BUSCANDO NODO TARGET...");
                    targetLabel.innerHTML = '<span class="scanning-text text-blue-500">DETECTANDO...</span>';
                }
                if (progress === 60) {
                    const targetText = authenticatedUser && authenticatedUser.target ? authenticatedUser.target : 'NODO DESCONOCIDO';
                    addLog(`NODO ENCONTRADO: ${targetText}`);
                    targetLabel.innerHTML = `<span class="scanning-text">${targetText}</span>`;
                    connLine.classList.replace('opacity-0', 'opacity-100');
                }
                if (progress === 80) addLog("ESTABLECIENDO TÚNEL SEGURO...");

                if (progress >= 100) {
                    clearInterval(interval);
                    setFinalState();
                    localStorage.setItem('secureNetworkActive', 'true');
                }
            }, 50);
        }

        function setFinalState() {
            root.classList.remove('status-alert');
            root.classList.add('active-mode');
            root.classList.remove('hidden');
            pWrap.style.display = 'none';
            sysStatus.innerText = "ENLACE CIFRADO";
            sysStatus.className = "text-[8px] font-black text-blue-500 uppercase tracking-widest";
            counterText.innerText = "ESTADO: CONECTADO";
            counterText.classList.replace('text-zinc-500', 'text-blue-500');
            disconnectBtn.classList.remove('hidden');
            const originText = secureConfig && secureConfig.origin ? secureConfig.origin : "RIAD, SA";
            const targetText = authenticatedUser && authenticatedUser.target ? authenticatedUser.target : "MADRID, ES";
            originLabel.innerText = originText;
            targetLabel.innerText = targetText;
            connLine.classList.add('opacity-100');
            if (authenticatedUser) {
                addLog(`ENLACE ESTABLECIDO PARA: ${authenticatedUser.usuario}`);
                addLog(`STATUS: ${authenticatedUser.status} | RELACIÓN: ${authenticatedUser.relacion}`);
                addLog(`TARGET: ${authenticatedUser.target}`);
            }
            addLog("ENLACE PUNTO A PUNTO ESTABLECIDO.");
        }

        function disconnectUplink() {
            addLog("CERRANDO TÚNEL...", 'warning');
            localStorage.setItem('secureNetworkActive', 'false');
            
            setTimeout(() => {
                root.classList.remove('active-mode');
                root.classList.add('status-alert');
                sysStatus.innerText = "Enlace Vulnerable";
                sysStatus.className = "text-[8px] font-black text-red-600 uppercase tracking-widest";
                counterText.innerText = "";
                disconnectBtn.classList.add('hidden');
                originLabel.innerText = "---";
                targetLabel.innerText = "---";
                connLine.classList.replace('opacity-100', 'opacity-0');
                addLog("STANDBY: ENLACE TERMINADO.", 'warning');
            }, 800);
        }
    </script>
</body>
</html>
