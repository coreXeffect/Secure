<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign OS - Comprobando Uplink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="text-white antialiased bg-black">

    <header class="p-6 flex justify-between items-center border-b border-zinc-900 bg-black">
        <img src="../logo.png" alt="Logo" class="h-6 w-auto">
        <div class="text-right">
            <span id="sys-status" class="text-[8px] font-black text-zinc-500 uppercase tracking-widest">Chequeando Red Segura...</span>
        </div>
    </header>

    <main class="flex flex-col items-center justify-center h-[80vh] p-6 space-y-8">
        <div class="w-full max-w-xs terminal-box p-4 rounded-lg border border-zinc-800 shadow-2xl">
            <div id="log-container" class="space-y-1 text-[10px] font-mono leading-snug">
                <div class="log-line log-active">&gt; INICIALIZANDO ESCANEO DE ESTADO...</div>
                <div class="log-line log-active text-zinc-500">&gt; ESPERANDO RESPUESTA DEL NODO...</div>
            </div>
        </div>

        <div class="flex items-center gap-2 text-[9px] text-zinc-500 font-mono">
            <i class="fas fa-satellite-dish animate-pulse text-blue-500"></i>
            <span id="hint-text">No cierres esta pantalla. Verificando uplink...</span>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-zinc-900 px-8 py-6 flex justify-between items-center z-[1000]">
        <a href="../indexemployee.html" class="text-zinc-800"><i class="fas fa-home text-lg"></i></a>
        <a href="../encryptions/Network_status.html" class="text-blue-500"><i class="fas fa-network-wired text-lg"></i></a>
        <a href="../Location Safety/location_safety.html" class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center -mt-10 border-4 border-black shadow-lg shadow-red-900/40">
            <i class="fas fa-exclamation-triangle text-white"></i>
        </a>
        <a href="../encryptions/encryption_health.html" class="text-zinc-800"><i class="fas fa-lock text-lg"></i></a>
        <a href="../encryptions/index.html" class="text-zinc-800"><i class="fas fa-layer-group text-lg"></i></a>
    </nav>

    <script>
        const log = document.getElementById('log-container');
        const sysStatus = document.getElementById('sys-status');
        const hintText = document.getElementById('hint-text');

        function addLog(text, extraClass = '') {
            const line = document.createElement('div');
            line.className = 'log-line log-active text-[10px] font-mono leading-snug';
            if (extraClass) {
                line.classList.add(extraClass);
            }
            line.innerText = `> ${text}`;
            log.appendChild(line);
            if (log.children.length > 8) log.removeChild(log.children[0]);
        }

        function redirectTo(path) {
            setTimeout(() => {
                window.location.href = path;
            }, 650);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                addLog('LEYENDO CONFIGURACIÓN DE NODO...');
                // El JSON está en la misma carpeta que esta página (/Networks),
                // así que lo pedimos relativo al propio directorio.
                const response = await fetch('secureuplink.json?_=' + Date.now());
                if (!response.ok) throw new Error('No se pudo cargar secureuplink.json');

                const cfg = await response.json();
                const status = (cfg.status || '').toLowerCase();

                if (status === 'online') {
                    sysStatus.innerText = 'Nodo Disponible';
                    sysStatus.className = 'text-[8px] font-black text-emerald-400 uppercase tracking-widest';
                    addLog('STATUS: ONLINE', 'text-emerald-400');
                    addLog('REDIRIGIENDO A TERMINAL SEGURA...');
                    hintText.innerText = 'Enlace disponible. Abriendo uplink...';
                    redirectTo('secure_uplink.html');
                } else {
                    sysStatus.innerText = 'Nodo Offline';
                    sysStatus.className = 'text-[8px] font-black text-red-600 uppercase tracking-widest';
                    addLog('STATUS: OFFLINE', 'text-red-500');
                    addLog('REDIRIGIENDO A PANTALLA DE FALLO...', 'text-red-500');
                    hintText.innerText = 'Red no disponible. Mostrando estado de fallo...';
                    redirectTo('secure_uplink_lost.html');
                }
            } catch (err) {
                sysStatus.innerText = 'Error de Configuración';
                sysStatus.className = 'text-[8px] font-black text-red-600 uppercase tracking-widest';
                addLog('ERROR: IMPOSIBLE LEER CONFIGURACIÓN.', 'text-red-500');
                addLog('ASUMIENDO NODO OFFLINE.', 'text-red-500');
                hintText.innerText = 'Fallo en la configuración. Red no disponible.';
                redirectTo('secure_uplink_lost.html');
            }
        });
    </script>

</body>
</html>
